syntax = "proto3";

package graphql;

import "google/protobuf/descriptor.proto";

option go_package = "github.com/proto-graphql/proto-graphql/go/graphqlpb";

message GraphqlSchemaOptions {
  string type_prefix = 1;
  bool ignore_requests = 2;
  bool ignore_responses = 3;
  bool ignore = 4;

  // EXPERIMENTAL: this option is under active development and may change without notice.
  // Renames `XxxRequest` messages to `XxxInput` and generates only the Input
  // type for them (suffix-transform variant of `ignore_requests`). If both
  // `ignore_requests` and `requests_as_inputs` are set for the same
  // message, `ignore_requests` wins and the codegen tool should warn about
  // the combination.
  bool requests_as_inputs = 5;
  // EXPERIMENTAL: this option is under active development and may change without notice.
  // Renames `XxxResponse` messages to `XxxPayload` and generates only the
  // Object type for them (suffix-transform variant of `ignore_responses`).
  // If both `ignore_responses` and `responses_as_payloads` are set for the
  // same message, `ignore_responses` wins and the codegen tool should warn
  // about the combination.
  bool responses_as_payloads = 6;
}

extend google.protobuf.FileOptions {
  GraphqlSchemaOptions schema = 2056;
}

message GraphqlObjectTypeOptions {
  // Do not generate GraphQL Object and Input. Nested types will not be ignored.
  bool ignore = 1;
  // If `squash_union` is true, the message is converted to `union` instead of object type.
  //
  // ```proto
  // message Content {
  //   option (graphql.object_type).squash_union = true;
  //   oneof content {
  //     Blog blog = 2;
  //     Video video = 2;
  //   }
  // }
  // ```
  //
  // ```grahpql
  // union Content = Blog | Video
  // ```
  bool squash_union = 2;
  // If `interface` is true, the message is converted to `interface` instead of object type.
  bool interface = 3;
  // Specify a object name in GraphQL. If do not specified, use the same as a Protobuf message field name.
  //
  // ```proto
  // message Foo {
  //   option (graphql.object_type).name = "Bar"
  //   // ...
  // }
  // ````
  //
  // ```grahpql
  // object Bar {
  //   # ...
  // }
  // ```
  string name = 4;
}

message GraphqlInputTypeOptions {
  // Do not always generate partial input types.
  bool no_partial = 1;
  // Do not generate GraphQL Input. Nested types will not be ignored.
  bool ignore = 2;
}

extend google.protobuf.MessageOptions {
  GraphqlObjectTypeOptions object_type = 2056;
  GraphqlInputTypeOptions input_type = 2057;
}

enum Nullability {
  NULLABILITY_UNSPECIFIED = 0;
  NULLABLE = 1;
  NON_NULL = 2;
}

message GraphqlFieldOptions {
  bool ignore = 1;
  // Specify a field name in GraphQL. If do not specified, use the same as a Protobuf message field name.
  //
  // ```proto
  // message User {
  //   // Required. Output only.
  //   uint64 id = 1 [(graphql.field).name = "databaseId"];
  // }
  // ````
  //
  // ```grahpql
  // object User {
  //   databaseId: String!
  // }
  // ```
  string name = 2;
  // Omit resolver implementation in code generation.
  bool skip_resolver = 3;
  // Use ID type.
  //
  // ```proto
  // message User {
  //   // Required. Output only.
  //   uint64 id = 1 [(graphql.field).id = true];
  // }
  // ````
  //
  // ```grahpql
  // object User {
  //   id: ID!
  // }
  // ```
  bool id = 4;

  // Indicates the nullability of the output for a given field.
  Nullability output_nullability = 11;
  // Indicates the nullability of the input for a given field.
  Nullability input_nullability = 12;
  // Indicates the nullability of the partial input for a given field.
  Nullability partial_input_nullability = 13;
}

extend google.protobuf.FieldOptions {
  GraphqlFieldOptions field = 2056;
}

message GraphqlOneofOptions {
  bool ignore = 1;
}

extend google.protobuf.OneofOptions {
  GraphqlOneofOptions oneof = 2056;
}

message GraphqlEnumOptions {
  bool ignore = 1;
  // Specify an enum name in GraphQL. If do not specified, use the same as a Protobuf message field name.
  //
  // ```proto
  // enum Foo {
  //   option (graphql.enum_type).name = "Bar"
  //   // ...
  // }
  // ````
  //
  // ```grahpql
  // enum Bar {
  //   # ...
  // }
  // ```
  string name = 4;
}

extend google.protobuf.EnumOptions {
  GraphqlEnumOptions enum_type = 2056;
}

message GraphqlEnumValueOptions {
  bool ignore = 1;
}

extend google.protobuf.EnumValueOptions {
  GraphqlEnumValueOptions enum_value = 2056;
}

// EXPERIMENTAL: this option is under active development and may change without notice.
// The kind of GraphQL operation an RPC is exposed as. Future kinds may be
// added here (e.g. a field-targeting kind for federation-style `extend`).
enum GraphqlOperation {
  // Not exposed as a GraphQL operation (the default).
  GRAPHQL_OPERATION_UNSPECIFIED = 0;
  QUERY = 1;
  MUTATION = 2;
}

// EXPERIMENTAL: this option is under active development and may change without notice.
// Controls whether and how an individual RPC is generated as a GraphQL
// Query/Mutation field. Each RPC declares its own exposure via `operation`.
message GraphqlRpcOptions {
  // Disables generation for this RPC while keeping the declaration (e.g.
  // `operation`) in place, so it can be re-enabled later without losing the
  // annotation.
  bool ignore = 1;
  // Setting this to QUERY or MUTATION opts this RPC into Query/Mutation
  // generation. Left unset (GRAPHQL_OPERATION_UNSPECIFIED), the RPC is not
  // generated.
  GraphqlOperation operation = 2;
  // Overrides the field name. Defaults to the camelCase of the RPC name.
  string name = 3;
  // Unwraps the specified field of the response and uses it as the return
  // value.
  string expose_field = 4;

  // Declares this RPC as a batch loader generation target, independent of
  // federation. Consumed by protoc-gen-dataloader; see
  // docs/design/protoc-gen-dataloader/design.md for details.
  GraphqlRpcBatchOptions batch = 5;

  // Field number 10 is reserved for federation support (Step 2) and
  // intentionally not defined yet; it lands with its consumer.
}

// EXPERIMENTAL: this option is under active development and may change without notice.
// Consumed by protoc-gen-dataloader; see
// docs/design/protoc-gen-dataloader/design.md for details.
message GraphqlRpcBatchOptions {
  // The repeated key-list field on the request. May be omitted if the
  // request has exactly one repeated field (auto-inferred).
  string key_field = 1;
  // The repeated entity-list field on the response. May be omitted if the
  // response has exactly one repeated message field (auto-inferred).
  string entity_field = 2;
  // The key field on the entity, used for key matching. Required in both
  // entity and group mode for now. Planned: entity mode will fall back to
  // the entity's `(graphql.object_type).federation.key` when this is
  // omitted, once federation support lands.
  string entity_key = 3;
  // Generates a group loader: one key maps to N entities.
  bool group = 4;
  // The maximum number of keys to send in a single RPC call (DataLoader's
  // `maxBatchSize`). 0 means unlimited.
  uint32 max_batch_size = 5;
}

extend google.protobuf.MethodOptions {
  GraphqlRpcOptions rpc = 2056;
}
